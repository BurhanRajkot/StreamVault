<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#0a0b0f" />

    <meta property="og:title" content="StreamVault • Watch Movies, TV Shows &amp; Anime Online Free" />
    <meta property="og:description" content="StreamVault is your ultimate destination to watch movies, TV shows, and anime online for free. Enjoy high-quality streaming with no sign-up required." />

    <meta name="twitter:card" content="summary_large_image" />

    <!-- PWA Support -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="StreamVault" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>" />

    <!-- Preconnect to Google Fonts (non-blocking font loading) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Load fonts non-blocking: media="print" trick avoids render-blocking -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" />
    </noscript>

    <!-- Preconnect to TMDB image CDN for faster image loading -->
    <link rel="preconnect" href="https://image.tmdb.org" crossorigin />
    <link rel="dns-prefetch" href="https://image.tmdb.org" />

    <!-- Streaming providers are used on watch pages; keep these as DNS hints on home -->
    <link rel="dns-prefetch" href="https://vidsrc.to" />
    <link rel="dns-prefetch" href="https://vidfast.pro" />
    <link rel="dns-prefetch" href="https://vidsrc.icu" />
    <link rel="dns-prefetch" href="https://vidlink.pro" />
    <link rel="dns-prefetch" href="https://vidsrc.cc" />
    <link rel="dns-prefetch" href="https://player.videasy.net" />
  </head>

  </body>
