# StreamVault — GitOps Image Tag Updater
# Triggered after the main CI/CD pipeline successfully publishes images.
# Updates the Kustomize image tags in the production overlay, creating a
# commit that ArgoCD detects and syncs to the cluster.

name: "GitOps — Update Image Tags"

on:
  workflow_run:
    workflows: ["StreamVault CI/CD"]
    types: [completed]
    branches: [main]

permissions:
  contents: write

jobs:
  update-manifests:
    name: "Update K8s Image Tags"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'

    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Resolve image tag
        id: tag
        run: |
          SHA="${{ github.event.workflow_run.head_sha }}"
          SHORT_SHA="${SHA:0:7}"
          TAG="sha-${SHORT_SHA}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "full_sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "Image tag: ${TAG}"

      - name: Update production kustomization
        run: |
          KUSTOMIZATION="k8s/overlays/production/kustomization.yaml"
          TAG="${{ steps.tag.outputs.tag }}"

          echo "Updating image tags to: ${TAG}"

          # Use sed to update the newTag fields for both frontend and backend.
          # The kustomization.yaml uses the 'images' transformer:
          #   images:
          #     - name: ghcr.io/burhanrajkot/streamvault-frontend
          #       newTag: <value>
          #     - name: ghcr.io/burhanrajkot/streamvault-backend
          #       newTag: <value>
          sed -i "s|newTag: .*# Replaced by GitOps workflow with sha-<commit>|newTag: ${TAG}  # Replaced by GitOps workflow with sha-<commit>|g" "$KUSTOMIZATION"
          sed -i "s|newTag: sha-[a-f0-9]*|newTag: ${TAG}|g" "$KUSTOMIZATION"

          echo "Updated kustomization:"
          cat "$KUSTOMIZATION"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add k8s/overlays/production/kustomization.yaml

          # Only commit if there are actual changes
          if git diff --cached --quiet; then
            echo "No changes to commit — image tags already up to date."
            exit 0
          fi

          TAG="${{ steps.tag.outputs.tag }}"
          SHA="${{ steps.tag.outputs.full_sha }}"

          git commit -m "chore(gitops): update image tags to ${TAG}

          Source commit: ${SHA}
          Triggered by: StreamVault CI/CD workflow run
          ArgoCD will auto-sync this change to the production cluster."

          git push origin main
