# StreamVault — Automated Dependency Update Workflow
#
# Runs npm-check-updates (ncu) against the frontend and backend package.json
# files on a weekly schedule, targeting `latest` — including major version
# bumps, e.g. a new React major. This complements Dependabot (which handles
# lockfiles and Docker images via its own PR flow) by aggressively bumping
# semver ranges in package.json itself.
#
# HANDS-OFF BY DESIGN: after bumping, each area's job runs the same
# type-check/lint/build/test steps its normal CI job runs, using the updated
# dependencies. Only if that validation passes does this workflow commit
# directly to `main` and push — no PR, no manual click. If validation fails,
# or if the direct push is rejected (e.g. branch protection), it falls back
# to opening a PR instead, so a human reviews what actually broke rather than
# a broken upgrade landing on `main` unreviewed.
#
# This is safe to run unattended because a push to `main` re-triggers the
# FULL ci.yml pipeline (type-check/lint/build/test/e2e/CodeQL/security scans),
# and publish-images (what GitOps/ArgoCD deploys from) only runs after
# status-check succeeds there too. A bad auto-push can reach `main`, but it
# can't reach production undetected.
#
# Schedule: Every Tuesday at 03:00 UTC (one day after Dependabot's Monday sweep,
#           so both sets of PRs don't pile up on the same day).
#
# Manual trigger: workflow_dispatch (run it any time from the Actions tab).
#
# Required secret / permission:
#   - GITHUB_TOKEN (built-in) — used to push directly and, on fallback, to
#     open a PR via gh CLI.
#   - The workflow needs `contents: write` + `pull-requests: write`.

name: Dependency Update

on:
  schedule:
    - cron: "0 3 * * 2" # Every Tuesday 03:00 UTC
  workflow_dispatch:
    inputs:
      target:
        description: "Which packages to upgrade (always targets latest, including majors)"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - frontend
          - backend

concurrency:
  group: dependency-update
  cancel-in-progress: false # Never cancel an in-flight update job

permissions:
  contents: write
  pull-requests: write

env:
  NODE_VERSION: "24"
  BUN_VERSION: "1.3.14" # Latest stable. 1.4.0 does not exist and caused 404 errors.

jobs:
  # ──────────────────────────────────────────────────────────────
  #  UPDATE FRONTEND DEPS (root package.json)
  # ──────────────────────────────────────────────────────────────
  update-frontend:
    name: "Bump & Validate Frontend Dependencies"
    if: >-
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' && (
        inputs.target == 'all' ||
        inputs.target == 'frontend'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      VITE_MOCK_AUTH: "true"
      VITE_API_URL: "http://localhost:4173"
    outputs:
      changed: ${{ steps.ncu.outputs.changed }}
      summary: ${{ steps.ncu.outputs.summary }}
      validated: ${{ steps.validate.outputs.validated }}

    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: audit
          disable-sudo: true

      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          # Use a PAT or GITHUB_TOKEN — PAT preferred so a fallback PR
          # triggers CI. With GITHUB_TOKEN, GitHub blocks re-triggering to
          # prevent recursive workflows. If you have a bot PAT, set it here:
          #   token: ${{ secrets.DEPS_BOT_PAT }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install npm-check-updates
        run: npm install -g npm-check-updates@latest --no-fund --no-audit

      - name: Run ncu — frontend (target latest, majors included)
        id: ncu
        run: |
          echo "Running ncu with target=latest on root package.json"

          # Run ncu and capture output; --jsonUpgraded prints a JSON diff
          UPGRADED=$(ncu \
            --upgrade \
            --target latest \
            --jsonUpgraded \
            --reject "caniuse-lite" \
            2>/dev/null || echo "{}")

          echo "ncu output: ${UPGRADED}"

          # Check if anything actually changed
          if [ "$UPGRADED" = "{}" ] || [ -z "$UPGRADED" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "summary=No frontend packages need upgrading." >> "$GITHUB_OUTPUT"
          else
            COUNT=$(echo "$UPGRADED" | node -e \
              "const d=require('fs').readFileSync('/dev/stdin','utf8'); \
               console.log(Object.keys(JSON.parse(d)).length)")
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "summary=Frontend: ${COUNT} package(s) upgraded." >> "$GITHUB_OUTPUT"
          fi

      - name: Reinstall with updated versions
        if: steps.ncu.outputs.changed == 'true'
        run: npm install --legacy-peer-deps --no-audit

      # ── Validation gate — same checks frontend-ci runs, against the
      #    upgraded dependencies. continue-on-error so every check runs and
      #    reports, instead of the job aborting after the first failure.
      - name: Validate — type-check
        id: typecheck
        if: steps.ncu.outputs.changed == 'true'
        continue-on-error: true
        run: npx tsc --noEmit

      - name: Validate — lint
        id: lint
        if: steps.ncu.outputs.changed == 'true'
        continue-on-error: true
        run: npm run lint

      - name: Validate — build
        id: build
        if: steps.ncu.outputs.changed == 'true'
        continue-on-error: true
        run: npm run build

      - name: Validate — test
        id: test
        if: steps.ncu.outputs.changed == 'true'
        continue-on-error: true
        run: npm run test --if-present

      - name: Determine validation result
        id: validate
        run: |
          if [ "${{ steps.ncu.outputs.changed }}" != "true" ]; then
            echo "validated=true" >> "$GITHUB_OUTPUT" # nothing changed — vacuously fine
            exit 0
          fi
          if [ "${{ steps.typecheck.outcome }}" = "success" ] && \
             [ "${{ steps.lint.outcome }}" = "success" ] && \
             [ "${{ steps.build.outcome }}" = "success" ] && \
             [ "${{ steps.test.outcome }}" = "success" ]; then
            echo "validated=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning title=Dependency Update::Frontend validation failed (type-check=${{ steps.typecheck.outcome }}, lint=${{ steps.lint.outcome }}, build=${{ steps.build.outcome }}, test=${{ steps.test.outcome }}) — will open a PR instead of pushing to main."
            echo "validated=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload updated frontend manifests
        if: steps.ncu.outputs.changed == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: frontend-updated-manifests
          path: |
            package.json
            package-lock.json
          retention-days: 1

  # ──────────────────────────────────────────────────────────────
  #  UPDATE BACKEND DEPS (backend/package.json)
  # ──────────────────────────────────────────────────────────────
  update-backend:
    name: "Bump & Validate Backend Dependencies"
    if: >-
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' && (
        inputs.target == 'all' ||
        inputs.target == 'backend'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      changed: ${{ steps.ncu.outputs.changed }}
      summary: ${{ steps.ncu.outputs.summary }}
      validated: ${{ steps.validate.outputs.validated }}

    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: audit
          disable-sudo: true

      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Bun ${{ env.BUN_VERSION }}
        uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2.0.2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install npm-check-updates
        run: npm install -g npm-check-updates@latest --no-fund --no-audit

      - name: Run ncu — backend (target latest, majors included)
        id: ncu
        working-directory: ./backend
        run: |
          echo "Running ncu with target=latest on backend/package.json"

          UPGRADED=$(ncu \
            --upgrade \
            --target latest \
            --jsonUpgraded \
            2>/dev/null || echo "{}")

          echo "ncu output: ${UPGRADED}"

          if [ "$UPGRADED" = "{}" ] || [ -z "$UPGRADED" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "summary=No backend packages need upgrading." >> "$GITHUB_OUTPUT"
          else
            COUNT=$(echo "$UPGRADED" | node -e \
              "const d=require('fs').readFileSync('/dev/stdin','utf8'); \
               console.log(Object.keys(JSON.parse(d)).length)")
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "summary=Backend: ${COUNT} package(s) upgraded." >> "$GITHUB_OUTPUT"
          fi

      - name: Reinstall with updated versions (bun)
        if: steps.ncu.outputs.changed == 'true'
        working-directory: ./backend
        run: bun install

      # ── Validation gate — same checks backend-ci runs, against the
      #    upgraded dependencies.
      - name: Validate — type-check
        id: typecheck
        if: steps.ncu.outputs.changed == 'true'
        continue-on-error: true
        working-directory: ./backend
        run: bunx tsc --noEmit

      - name: Validate — lint
        id: lint
        if: steps.ncu.outputs.changed == 'true'
        continue-on-error: true
        working-directory: ./backend
        run: bun run lint

      - name: Validate — build
        id: build
        if: steps.ncu.outputs.changed == 'true'
        continue-on-error: true
        working-directory: ./backend
        run: bun run build

      - name: Validate — test
        id: test
        if: steps.ncu.outputs.changed == 'true'
        continue-on-error: true
        working-directory: ./backend
        run: bun run test

      - name: Determine validation result
        id: validate
        run: |
          if [ "${{ steps.ncu.outputs.changed }}" != "true" ]; then
            echo "validated=true" >> "$GITHUB_OUTPUT" # nothing changed — vacuously fine
            exit 0
          fi
          if [ "${{ steps.typecheck.outcome }}" = "success" ] && \
             [ "${{ steps.lint.outcome }}" = "success" ] && \
             [ "${{ steps.build.outcome }}" = "success" ] && \
             [ "${{ steps.test.outcome }}" = "success" ]; then
            echo "validated=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning title=Dependency Update::Backend validation failed (type-check=${{ steps.typecheck.outcome }}, lint=${{ steps.lint.outcome }}, build=${{ steps.build.outcome }}, test=${{ steps.test.outcome }}) — will open a PR instead of pushing to main."
            echo "validated=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload updated backend manifests
        if: steps.ncu.outputs.changed == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: backend-updated-manifests
          path: |
            backend/package.json
            backend/bun.lock
            backend/package-lock.json
          retention-days: 1

  # ──────────────────────────────────────────────────────────────
  #  LAND CHANGES — direct push to main when validated, PR fallback otherwise
  # ──────────────────────────────────────────────────────────────
  land-changes:
    name: "Land Dependency Changes"
    needs: [update-frontend, update-backend]
    # Run only if at least one of the jobs produced changes
    if: >-
      !cancelled() && (
        needs.update-frontend.outputs.changed == 'true' ||
        needs.update-backend.outputs.changed == 'true'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: audit
          disable-sudo: true

      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download updated frontend manifests
        if: needs.update-frontend.outputs.changed == 'true'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: frontend-updated-manifests
          path: ./ # Restore to root
        continue-on-error: true

      - name: Download updated backend manifests
        if: needs.update-backend.outputs.changed == 'true'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: backend-updated-manifests
          path: backend/
        continue-on-error: true

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Stage, commit, and push (direct, with PR fallback)
        id: stage
        env:
          FRONTEND_CHANGED: ${{ needs.update-frontend.outputs.changed }}
          BACKEND_CHANGED: ${{ needs.update-backend.outputs.changed }}
          FRONTEND_VALIDATED: ${{ needs.update-frontend.outputs.validated }}
          BACKEND_VALIDATED: ${{ needs.update-backend.outputs.validated }}
          FRONTEND_SUMMARY: ${{ needs.update-frontend.outputs.summary }}
          BACKEND_SUMMARY: ${{ needs.update-backend.outputs.summary }}
        run: |
          # Stage changed manifests only
          if [ "$FRONTEND_CHANGED" = "true" ]; then
            git add package.json package-lock.json || true
          fi
          if [ "$BACKEND_CHANGED" = "true" ]; then
            git add backend/package.json backend/bun.lock backend/package-lock.json || true
          fi

          if git diff --cached --quiet; then
            echo "Nothing to commit — manifests unchanged after restore."
            echo "committed=false" >> "$GITHUB_OUTPUT"
            echo "mode=none" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          VALIDATED=true
          if [ "$FRONTEND_CHANGED" = "true" ] && [ "$FRONTEND_VALIDATED" != "true" ]; then VALIDATED=false; fi
          if [ "$BACKEND_CHANGED" = "true" ] && [ "$BACKEND_VALIDATED" != "true" ]; then VALIDATED=false; fi

          git commit -m "chore(deps): automated dependency update $(date +'%Y-%m-%d')

          $([ "$FRONTEND_CHANGED" = "true" ] && echo "$FRONTEND_SUMMARY")
          $([ "$BACKEND_CHANGED" = "true" ] && echo "$BACKEND_SUMMARY")

          Automated by: .github/workflows/dependency-update.yml"
          echo "committed=true" >> "$GITHUB_OUTPUT"

          if [ "$VALIDATED" = "true" ]; then
            echo "In-job validation passed — pushing directly to main."
            if git push origin main; then
              echo "mode=direct_push" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "::warning title=Dependency Update::Direct push to main was rejected (branch protection?) — opening a PR with the same commit instead."
            REASON="push_rejected"
          else
            REASON="validation_failed"
          fi
          echo "reason=${REASON}" >> "$GITHUB_OUTPUT"

          BRANCH="chore/dep-update-$(date +'%Y-%m-%d-%H%M')"
          git checkout -b "${BRANCH}"
          git push origin "${BRANCH}"
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"
          echo "mode=pr_needed" >> "$GITHUB_OUTPUT"

      - name: Open Pull Request (fallback only)
        if: steps.stage.outputs.mode == 'pr_needed'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ steps.stage.outputs.branch }}
          REASON: ${{ steps.stage.outputs.reason }}
          FRONTEND_SUMMARY: ${{ needs.update-frontend.outputs.summary }}
          BACKEND_SUMMARY: ${{ needs.update-backend.outputs.summary }}
          FRONTEND_CHANGED: ${{ needs.update-frontend.outputs.changed }}
          BACKEND_CHANGED: ${{ needs.update-backend.outputs.changed }}
        run: |
          DATE=$(date +'%Y-%m-%d')

          if [ "$REASON" = "validation_failed" ]; then
            REASON_LINE="⚠️ **Why this is a PR, not a direct push:** the in-job validation (type-check/lint/build/test) failed against the upgraded dependencies. Review before merging."
          else
            REASON_LINE="⚠️ **Why this is a PR, not a direct push:** validation passed, but pushing directly to \`main\` was rejected (branch protection or similar). Merge normally once reviewed."
          fi

          BODY="## Automated Dependency Update — ${DATE}

          This PR was opened automatically by the \`dependency-update\` workflow.
          Targets are bumped to **latest**, including majors.

          ${REASON_LINE}

          ### Changes
          "

          if [ "$FRONTEND_CHANGED" = "true" ]; then
            BODY="${BODY}
          - 🎨 **Frontend**: ${FRONTEND_SUMMARY}"
          fi

          if [ "$BACKEND_CHANGED" = "true" ]; then
            BODY="${BODY}
          - ⚙️ **Backend**: ${BACKEND_SUMMARY}"
          fi

          BODY="${BODY}

          ### Checklist
          - [ ] CI passes (type-check, lint, build, tests, E2E)
          - [ ] Bundle size not significantly increased
          - [ ] No breaking API changes in upgraded packages
          - [ ] Security scan clean

          > _Merge when CI is green. If something breaks, close this PR and investigate._"

          gh pr create \
            --title "chore(deps): automated dependency update ${DATE}" \
            --body  "${BODY}" \
            --base  main \
            --head  "${BRANCH}" \
            --label "dependencies,automated" \
            || echo "PR may already exist for this branch — skipping."

  # ──────────────────────────────────────────────────────────────
  #  REPORT — summary even when nothing changed
  # ──────────────────────────────────────────────────────────────
  report:
    name: "Update Summary"
    needs: [update-frontend, update-backend, land-changes]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Print summary
        env:
          FRONTEND_CHANGED: ${{ needs.update-frontend.outputs.changed }}
          FRONTEND_SUMMARY: ${{ needs.update-frontend.outputs.summary }}
          FRONTEND_VALIDATED: ${{ needs.update-frontend.outputs.validated }}
          BACKEND_CHANGED: ${{ needs.update-backend.outputs.changed }}
          BACKEND_SUMMARY: ${{ needs.update-backend.outputs.summary }}
          BACKEND_VALIDATED: ${{ needs.update-backend.outputs.validated }}
          LAND_RESULT: ${{ needs.land-changes.result }}
        run: |
          echo "## StreamVault Dependency Update Report"
          echo ""
          echo "| Area     | Changed | Validated | Summary |"
          echo "|----------|---------|-----------|---------|"
          echo "| Frontend | ${FRONTEND_CHANGED:-false} | ${FRONTEND_VALIDATED:-n/a} | ${FRONTEND_SUMMARY:-no changes} |"
          echo "| Backend  | ${BACKEND_CHANGED:-false}  | ${BACKEND_VALIDATED:-n/a}  | ${BACKEND_SUMMARY:-no changes}  |"
          echo ""
          if [ "$LAND_RESULT" = "success" ]; then
            echo "✅ Changes landed — check main's history or the Pull Requests tab."
          elif [ "$LAND_RESULT" = "skipped" ]; then
            echo "✅ No packages to upgrade this week — all up to date."
          else
            echo "⚠️  land-changes job result: ${LAND_RESULT}"
          fi
