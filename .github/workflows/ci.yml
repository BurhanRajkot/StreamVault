# StreamVault CI/CD
# Path-filtered, security-hardened, SLSA L3-attested pipeline.
# All third-party actions pinned to immutable commit SHAs.

name: StreamVault CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    - cron: "31 2 * * 1"   # Weekly security sweep — Monday 02:31 UTC

concurrency:
  group: streamvault-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "24"
  BUN_VERSION:  "latest"
  PLATFORMS:    "linux/amd64,linux/arm64"
  # Opt in to Node.js 24 for JS-based actions ahead of the June 2026 migration.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# ──────────────────────────────────────────────────────────────
#  CHANGE DETECTION
#  Skips downstream jobs when their paths are unmodified.
# ──────────────────────────────────────────────────────────────
jobs:

  change-detection:
    name: "Detect Changes"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend:  ${{ steps.filter.outputs.backend }}
      docker:   ${{ steps.filter.outputs.docker }}
      infra:    ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5.0.0

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36  # v3.0.2
        with:
          filters: |
            frontend:
              - "src/**"
              - "public/**"
              - "package.json"
              - "package-lock.json"
              - "tsconfig*.json"
              - "vite.config.*"
              - "shared/**"
            backend:
              - "backend/**"
              - "shared/**"
            docker:
              - "Dockerfile"
              - "backend/Dockerfile"
              - "docker-compose*.yml"
              - ".dockerignore"
            infra:
              - "infra/**"
              - "k8s/**"
              - ".github/workflows/**"

# ──────────────────────────────────────────────────────────────
#  SECRET SCAN  (always runs — fail fast before any build)
# ──────────────────────────────────────────────────────────────

  secret-scan:
    name: "Secret Scan"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5.0.0
        with:
          fetch-depth: 0   # Full history required by Gitleaks

      - name: Install Gitleaks
        # Install the binary directly to avoid the Node.js wrapper's deprecation noise.
        run: |
          GITLEAKS_VERSION="8.24.3"
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Scan for leaked credentials
        run: |
          gitleaks detect \
            --redact \
            --exit-code=2 \
            --report-format=sarif \
            --report-path=results.sarif \
            --log-opts=-1

      - name: Upload SARIF results
        if: always()
        uses: github/codeql-action/upload-sarif@f35333b910470a5408cb081b68f0701254a7d27b  # v3.28.18
        with:
          sarif_file: results.sarif
          category: gitleaks

# ──────────────────────────────────────────────────────────────
#  DEPENDENCY REVIEW  (pull requests only)
# ──────────────────────────────────────────────────────────────

  dependency-review:
    name: "Dependency Review"
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Requires the Dependency Graph feature to be enabled in repo settings.
    # Settings → Code security and analysis → Dependency graph.
    # Remove continue-on-error once it's enabled.
    continue-on-error: true
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5.0.0

      - name: Review dependency changes
        uses: actions/dependency-review-action@38ecb5b593bf0eb19e335c03f97670f792489a8b  # v4.7.0
        with:
          fail-on-severity: high
          comment-summary-in-pr: always

# ──────────────────────────────────────────────────────────────
#  FRONTEND CI
#  Runs on: src/**, public/**, package*, tsconfig*, vite.config*
# ──────────────────────────────────────────────────────────────

  frontend-ci:
    name: "Frontend — Type-check, Lint, Build & Test"
    needs: [change-detection, secret-scan]
    if: needs.change-detection.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      VITE_MOCK_AUTH: "true"
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5.0.0

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Bun ${{ env.BUN_VERSION }}
        uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76  # v2.0.2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Type-check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Check bundle size
        run: |
          BUNDLE_KB=$(du -sk dist/ | cut -f1)
          echo "Bundle size: ${BUNDLE_KB} KB"
          # Warn (but don't fail) if the uncompressed bundle exceeds 25 MB.
          if [ "$BUNDLE_KB" -gt 25600 ]; then
            echo "::warning title=Bundle size::Uncompressed dist/ is ${BUNDLE_KB} KB — consider code splitting."
          fi

      - name: Run tests
        run: |
          if npm run test --if-present 2>/dev/null; then
            echo "Tests passed."
          else
            SCRIPT=$(node -e "const p=require('./package.json');console.log(p.scripts?.test||'')")
            if [ -z "$SCRIPT" ]; then
              echo "No test script defined — skipping."
            else
              echo "::error title=Test failure::Tests exited with a non-zero code."
              exit 1
            fi
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: frontend-dist
          path: dist/
          retention-days: 1

# ──────────────────────────────────────────────────────────────
#  BACKEND CI
#  Runs on: backend/**, shared/**
# ──────────────────────────────────────────────────────────────

  backend-ci:
    name: "Backend — Lint, Build & Test"
    needs: [change-detection, secret-scan]
    if: needs.change-detection.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5.0.0

      # Cache Bun's global package store. Key is tied to the lockfile;
      # restore-keys allow partial hits when packages are added/removed.
      - name: Restore Bun cache
        id: bun-cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684  # v4.2.3
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('backend/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Setup Bun ${{ env.BUN_VERSION }}
        uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76  # v2.0.2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        working-directory: ./backend
        run: bun install --frozen-lockfile

      - name: Type-check
        working-directory: ./backend
        run: bunx tsc --noEmit

      - name: Lint
        working-directory: ./backend
        run: bun run lint

      - name: Build
        working-directory: ./backend
        run: bun run build

      - name: Run tests
        working-directory: ./backend
        run: bun run test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: backend-test-results
          path: backend/test-results.xml
          retention-days: 7

# ──────────────────────────────────────────────────────────────
#  CODEQL ANALYSIS
#  Uploads results to the Security tab; runs in parallel with CI.
# ──────────────────────────────────────────────────────────────

  codeql:
    name: "CodeQL Analysis"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions:         read
      contents:        read
      security-events: write
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@f35333b910470a5408cb081b68f0701254a7d27b  # v3.28.18
        with:
          languages: javascript-typescript
          queries: security-and-quality

      - uses: github/codeql-action/autobuild@f35333b910470a5408cb081b68f0701254a7d27b  # v3.28.18

      - name: Analyze
        uses: github/codeql-action/analyze@f35333b910470a5408cb081b68f0701254a7d27b  # v3.28.18
        with:
          category: "/language:javascript-typescript"

# ──────────────────────────────────────────────────────────────
#  E2E / AUDIT TESTS  (runs after frontend build succeeds)
#
#  Uses Playwright + Chromium to audit:
#    - Homepage loads, SEO meta tags, H1 presence
#    - Navigation + keyboard accessibility
#    - Route protection (unauthenticated redirects)
#    - Mobile viewport rendering
#    - Performance budget (no >2MB JS chunks)
#    - 404 page
# ──────────────────────────────────────────────────────────────

  e2e-audit:
    name: "E2E / Audit Tests"
    needs: [change-detection, frontend-ci]
    if: |
      always() &&
      (needs.frontend-ci.result == 'success' || needs.frontend-ci.result == 'skipped') &&
      (needs.change-detection.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      VITE_MOCK_AUTH: "true"
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5.0.0

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Download built frontend artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: frontend-dist
          path: dist/
        continue-on-error: true   # Falls back to building locally if artifact unavailable

      - name: Build frontend (fallback if artifact missing)
        run: |
          if [ ! -d "dist" ] || [ -z "$(ls -A dist 2>/dev/null)" ]; then
            echo "No dist artifact found — building locally."
            npm run build
          fi

      - name: Start vite preview server
        run: npx vite preview --port 4173 &
        env:
          NODE_ENV: production

      - name: Wait for preview server
        run: npx wait-on http://localhost:4173 --timeout 30000

      - name: Run Playwright E2E / Audit tests
        run: npm run e2e:ci
        env:
          BASE_URL: http://localhost:4173
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 14

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: playwright-results
          path: e2e/test-results/
          retention-days: 14

# ──────────────────────────────────────────────────────────────
#  STATUS GATE
#  Branch protection requires a single required check.
#  This job is always triggered and evaluates all upstream
#  outcomes — 'skipped' (path filter) is treated as passing.
# ──────────────────────────────────────────────────────────────

  status-check:
    name: "All Checks Passed"
    needs: [frontend-ci, backend-ci, codeql, e2e-audit]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Evaluate outcomes
        run: |
          frontend="${{ needs.frontend-ci.result }}"
          backend="${{ needs.backend-ci.result }}"
          codeql="${{ needs.codeql.result }}"
          e2e="${{ needs.e2e-audit.result }}"

          printf "%-20s %s\n" "Job" "Result"
          printf "%-20s %s\n" "---" "------"
          printf "%-20s %s\n" "frontend-ci"  "$frontend"
          printf "%-20s %s\n" "backend-ci"   "$backend"
          printf "%-20s %s\n" "codeql"       "$codeql"
          printf "%-20s %s\n" "e2e-audit"    "$e2e"

          FAILED=0
          for result in "$frontend" "$backend" "$codeql"; do
            if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
              FAILED=1
            fi
          done

          if [ "$FAILED" -eq 1 ]; then
            echo ""
            echo "One or more required jobs failed — see above."
            exit 1
          fi
          echo ""
          echo "All checks passed or were skipped by path filter."

# ──────────────────────────────────────────────────────────────
#  DOCKER BUILD & PUBLISH  (main branch pushes only)
#
#  Order of operations per image:
#    1. Build locally (no push)
#    2. Trivy scan — BLOCK on fixable CRITICAL/HIGH CVEs
#    3. Push multi-platform image with provenance + SBOM
#
#  Registry: ghcr.io/<owner-lc>/streamvault-{frontend,backend}
# ──────────────────────────────────────────────────────────────

  publish-images:
    name: "Build, Scan & Publish Docker Images"
    runs-on: ubuntu-latest
    needs: [status-check, secret-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 60
    permissions:
      contents:        read
      packages:        write
      attestations:    write
      id-token:        write
      security-events: write

    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5.0.0

      - name: Setup QEMU
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392  # v3.6.0

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2  # v3.10.0
        with:
          driver: docker-container

      - name: Login to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772  # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # GHCR image names must be lowercase.
      - name: Resolve image namespace
        id: ns
        run: echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      # ── Frontend ────────────────────────────────────────────

      - name: Docker metadata — frontend
        id: meta_frontend
        uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804  # v5.7.0
        with:
          images: ghcr.io/${{ steps.ns.outputs.owner_lc }}/streamvault-frontend
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
          labels: |
            org.opencontainers.image.title=StreamVault Frontend
            org.opencontainers.image.description=StreamVault web application frontend
            org.opencontainers.image.vendor=${{ github.repository_owner }}

      - name: Build frontend image (local, pre-scan)
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83  # v6.18.0
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: streamvault-frontend:scan
          cache-from: type=gha,scope=frontend
          cache-to:   type=gha,scope=frontend,mode=max

      - name: Scan frontend image with Trivy
        id: trivy_frontend
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8  # v0.36.0
        with:
          image-ref:      streamvault-frontend:scan
          format:         sarif
          output:         trivy-frontend.sarif
          severity:       CRITICAL,HIGH
          exit-code:      "1"   # BLOCK on fixable CRITICAL/HIGH — hardened per supply chain policy
          ignore-unfixed: true  # Don't block on zero-days with no upstream patch

      - name: Upload frontend Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@f35333b910470a5408cb081b68f0701254a7d27b  # v3.28.18
        with:
          sarif_file: trivy-frontend.sarif
          category:   trivy-frontend

      - name: Build and push frontend image (multi-platform)
        id: build_frontend
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83  # v6.18.0
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: ${{ env.PLATFORMS }}
          provenance: true
          sbom: true
          tags:   ${{ steps.meta_frontend.outputs.tags }}
          labels: ${{ steps.meta_frontend.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to:   type=gha,scope=frontend,mode=max

      - name: Attest frontend build provenance
        uses: actions/attest-build-provenance@db473fddc028af60658334401dc6fa3ffd8669fd  # v2.3.0
        with:
          subject-name:     ghcr.io/${{ steps.ns.outputs.owner_lc }}/streamvault-frontend
          subject-digest:   ${{ steps.build_frontend.outputs.digest }}
          push-to-registry: true

      # ── Backend ─────────────────────────────────────────────

      - name: Docker metadata — backend
        id: meta_backend
        uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804  # v5.7.0
        with:
          images: ghcr.io/${{ steps.ns.outputs.owner_lc }}/streamvault-backend
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
          labels: |
            org.opencontainers.image.title=StreamVault Backend
            org.opencontainers.image.description=StreamVault API backend
            org.opencontainers.image.vendor=${{ github.repository_owner }}

      - name: Build backend image (local, pre-scan)
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83  # v6.18.0
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          load: true
          tags: streamvault-backend:scan
          cache-from: type=gha,scope=backend
          cache-to:   type=gha,scope=backend,mode=max

      - name: Scan backend image with Trivy
        id: trivy_backend
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8  # v0.36.0
        with:
          image-ref:      streamvault-backend:scan
          format:         sarif
          output:         trivy-backend.sarif
          severity:       CRITICAL,HIGH
          exit-code:      "1"   # BLOCK on fixable CRITICAL/HIGH — hardened per supply chain policy
          ignore-unfixed: true  # Don't block on zero-days with no upstream patch

      - name: Upload backend Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@f35333b910470a5408cb081b68f0701254a7d27b  # v3.28.18
        with:
          sarif_file: trivy-backend.sarif
          category:   trivy-backend

      - name: Build and push backend image (multi-platform)
        id: build_backend
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83  # v6.18.0
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          platforms: ${{ env.PLATFORMS }}
          provenance: true
          sbom: true
          tags:   ${{ steps.meta_backend.outputs.tags }}
          labels: ${{ steps.meta_backend.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to:   type=gha,scope=backend,mode=max

      - name: Attest backend build provenance
        uses: actions/attest-build-provenance@db473fddc028af60658334401dc6fa3ffd8669fd  # v2.3.0
        with:
          subject-name:     ghcr.io/${{ steps.ns.outputs.owner_lc }}/streamvault-backend
          subject-digest:   ${{ steps.build_backend.outputs.digest }}
          push-to-registry: true

# ──────────────────────────────────────────────────────────────
#  DEPLOYMENT  (main branch pushes only)
#
#  Uses Workload Identity Federation — no long-lived secrets.
#  Swap the commented-out auth step for your cloud provider:
#    GCP   → google-github-actions/auth@v3
#    AWS   → aws-actions/configure-aws-credentials@v4
