      #   with:
      #     workload_identity_provider: projects/PROJECT_NUM/locations/global/workloadIdentityPools/POOL/providers/PROVIDER
      #     service_account: streamvault-deployer@PROJECT_ID.iam.gserviceaccount.com

      - name: Deploy canary release
        run: |
          # kubectl apply -f k8s/canary/
          # kubectl set image deployment/streamvault-canary \
          #   frontend=ghcr.io/${{ github.repository_owner }}/streamvault-frontend:sha-${{ github.sha }} \
          #   backend=ghcr.io/${{ github.repository_owner }}/streamvault-backend:sha-${{ github.sha }}
          echo "Canary deploy — replace with real commands."

      - name: Health-check canary
        run: |
          # kubectl rollout status deployment/streamvault-canary --timeout=5m
          # curl -sf https://canary.streamvault.example.com/health
          echo "Health check — replace with real commands."

  deploy-production:
