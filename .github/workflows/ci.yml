# StreamVault CI/CD
# Path-filtered, security-hardened, SLSA L3-attested pipeline.
# All third-party actions pinned to immutable commit SHAs.
#
# CHANGES vs. the previous revision (targeted hardening, not a rewrite):
#   - Secret scan now scopes git history correctly per trigger: PRs scan the
#     PR commit range, pushes scan the pushed range, and scheduled sweeps /
#     first pushes scan FULL history. The previous "--log-opts=-1" only ever
#     looked at the single latest commit, so a secret introduced earlier in a
#     multi-commit push would slip past. (Range vars passed via env: to stay
#     zizmor-clean — no ${{ github.event.* }} interpolated into run blocks.)
#   - Harden-Runner now sets disable-sudo on every job that doesn't need root
#     (everything except the Playwright apt install, Docker build, and deploys).
#   - Deploy jobs get their own concurrency group with cancel-in-progress:false
#     so a newer push can't cancel an in-flight production rollout mid-apply.
#   - deploy-production carries an explicit push+main guard (defence in depth;
#     it already inherits the gate transitively via deploy-canary).
#
# Unchanged and deliberately kept: Harden-Runner everywhere, SHA pins, the
# secret-scan status-gate fix, Trivy pre-push image scans, provenance + SBOM.
# OpenSSF Scorecard stays in its own scheduled workflow (scorecard.yml), which
# is the correct convention — don't fold it in here.

name: StreamVault CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    - cron: "31 2 * * 1" # Weekly security sweep — Monday 02:31 UTC

concurrency:
  group: streamvault-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "24"
  BUN_VERSION: "1.3.14" # Pinned (was "latest"). Bump deliberately, not implicitly.
  PLATFORMS: "linux/amd64,linux/arm64"
  # Opt JS-based actions onto Node 24 ahead of GitHub's 16-Jun-2026 default switch.
  # Once that date passes this is a no-op and can be removed.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# ──────────────────────────────────────────────────────────────
#  CHANGE DETECTION
# ──────────────────────────────────────────────────────────────
jobs:
  change-detection:
    name: "Detect Changes"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      docker: ${{ steps.filter.outputs.docker }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: audit
          disable-sudo: true

      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false # zizmor hardening

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            frontend:
              - "src/**"
              - "public/**"
              - "package.json"
              - "package-lock.json"
              - "tsconfig*.json"
              - "vite.config.*"
              - "shared/**"
            backend:
              - "backend/**"
              - "shared/**"
            docker:
              - "Dockerfile"
              - "backend/Dockerfile"
              - "docker-compose*.yml"
              - ".dockerignore"
            infra:
              - "infra/**"
              - "k8s/**"
              - ".github/workflows/**"

  # ──────────────────────────────────────────────────────────────
  #  WORKFLOW LINT (zizmor) — static analysis of the workflows themselves
  #  Catches template-injection sinks, over-broad permissions, unpinned
  #  refs, and dangerous triggers. Advisory; results go to the Security tab.
  # ──────────────────────────────────────────────────────────────

  workflow-lint:
    name: "Workflow Lint — zizmor"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: audit
          disable-sudo: true

      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false # zizmor hardening

      - name: Run zizmor
        env:
          GH_TOKEN: ${{ github.token }} # enables zizmor's online audits
        run: |
          pipx run zizmor \
            --format sarif \
            --persona regular \
            .github/ > zizmor.sarif || true
        continue-on-error: true

      - name: Upload zizmor SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@d77b13a0df3134d64a457ea9003f600b09fa1c8a # v3.36.1
        with:
          sarif_file: zizmor.sarif
          category: zizmor
        continue-on-error: true

  # ──────────────────────────────────────────────────────────────
  #  SECRET SCAN  (always runs — fail fast before any build)
  # ──────────────────────────────────────────────────────────────

  secret-scan:
    name: "Secret Scan"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: audit
          disable-sudo: true

      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 0 # Full history required by Gitleaks

      - name: Install Gitleaks
        run: |
          GITLEAKS_VERSION="8.24.3"
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Scan for leaked credentials
        # Scope the scan to the right history window per trigger. Event SHAs are
        # passed through env (never interpolated into the script body) so this
        # stays free of the template-injection pattern zizmor flags.
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE: ${{ github.event.pull_request.base.sha }}
          PUSH_BEFORE: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          ZERO="0000000000000000000000000000000000000000"
          LOGOPTS=""
          case "$EVENT_NAME" in
            pull_request)
              # Everything the PR adds on top of its base.
              LOGOPTS="--log-opts=${PR_BASE}..${HEAD_SHA}"
              ;;
            push)
              # Only the commits this push introduced (full history on a brand
              # new branch, where 'before' is the all-zero sentinel).
              if [ -n "$PUSH_BEFORE" ] && [ "$PUSH_BEFORE" != "$ZERO" ]; then
                LOGOPTS="--log-opts=${PUSH_BEFORE}..${HEAD_SHA}"
              fi
              ;;
            *)
              # schedule / workflow_dispatch → full repository history sweep.
              LOGOPTS=""
              ;;
          esac
          echo "Scan scope: ${LOGOPTS:-<full history>}"
          gitleaks detect \
            --config .gitleaks.toml \
            --redact \
            --exit-code=2 \
            --report-format=sarif \
            --report-path=results.sarif \
            $LOGOPTS

      - name: Upload SARIF results
        if: always()
        uses: github/codeql-action/upload-sarif@d77b13a0df3134d64a457ea9003f600b09fa1c8a # v3.36.1
        with:
          sarif_file: results.sarif
          category: gitleaks

  # ──────────────────────────────────────────────────────────────
  #  NPM / BUN AUDIT  (always runs)
  # ──────────────────────────────────────────────────────────────

  npm-audit:
    name: "npm / bun Audit"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: audit
          disable-sudo: true

      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false # zizmor hardening

      - name: Setup toolchain + install (frontend)
        uses: ./.github/actions/setup-ci
        with:
          node-version: ${{ env.NODE_VERSION }}
          install: npm
          install-args: "--legacy-peer-deps --ignore-scripts"

      - name: Frontend — npm audit (BLOCK on CRITICAL)
        run: npm audit --omit=dev --audit-level=critical

      - name: Frontend — npm audit (HIGH advisory)
        run: npm audit --omit=dev --audit-level=high || echo "::warning title=npm audit::HIGH severity vulnerabilities found — review before next release."
        continue-on-error: true

      - name: Setup Bun ${{ env.BUN_VERSION }}
        uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2.0.2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Backend — bun audit
        working-directory: ./backend
        run: |
          bun install --frozen-lockfile
          bun audit --level=critical || echo "::warning title=bun audit::Backend vulnerabilities found — review."
        continue-on-error: true

  # ──────────────────────────────────────────────────────────────
  #  OSV SCANNER
  # ──────────────────────────────────────────────────────────────

  osv-scan:
    name: "OSV Vulnerability Scan"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: audit
          disable-sudo: true

      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false # zizmor hardening

      - name: Run OSV Scanner
        uses: google/osv-scanner-action/osv-scanner-action@e69cc6c86b31f1e7e23935bbe7031b50e51082de # v2.0.2
        with:
          scan-args: |-
            --lockfile=package-lock.json
            --lockfile=backend/bun.lockb
            --format=sarif
            --output=osv-results.sarif
        continue-on-error: true # Advisory

      - name: Upload OSV SARIF results
        if: always()
        uses: github/codeql-action/upload-sarif@d77b13a0df3134d64a457ea9003f600b09fa1c8a # v3.36.1
        with:
          sarif_file: osv-results.sarif
          category: osv-scanner
        continue-on-error: true

  # ──────────────────────────────────────────────────────────────
  #  DEPENDENCY REVIEW  (pull requests only)
  # ──────────────────────────────────────────────────────────────

  dependency-review:
    name: "Dependency Review"
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Requires Dependency Graph: Settings → Code security → Dependency graph.
    # Remove continue-on-error once it's enabled.
    continue-on-error: true
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: audit
          disable-sudo: true

      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false # zizmor hardening

      - name: Review dependency changes
        uses: actions/dependency-review-action@38ecb5b593bf0eb19e335c03f97670f792489a8b # v4.7.0
        with:
          fail-on-severity: high
          comment-summary-in-pr: always

  # ──────────────────────────────────────────────────────────────
  #  FRONTEND CI
  # ──────────────────────────────────────────────────────────────

  frontend-ci:
    name: "Frontend — Type-check, Lint, Build & Test"
    needs: [change-detection, secret-scan]
    if: needs.change-detection.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      VITE_MOCK_AUTH: "true"
      VITE_API_URL: "http://localhost:4173"
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: audit
          disable-sudo: true

      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false # zizmor hardening

      - name: Setup toolchain + install
        uses: ./.github/actions/setup-ci
        with:
          node-version: ${{ env.NODE_VERSION }}
          bun: "true"
          bun-version: ${{ env.BUN_VERSION }}
          install: npm
          install-args: "--legacy-peer-deps"

      - name: Type-check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Check bundle size
        run: |
          BUNDLE_KB=$(du -sk dist/ | cut -f1)
          echo "Bundle size: ${BUNDLE_KB} KB"
          if [ "$BUNDLE_KB" -gt 25600 ]; then
            echo "::warning title=Bundle size::Uncompressed dist/ is ${BUNDLE_KB} KB — consider code splitting."
          fi

      - name: Run tests
        run: |
          if npm run test --if-present 2>/dev/null; then
            echo "Tests passed."
          else
            SCRIPT=$(node -e "const p=require('./package.json');console.log(p.scripts?.test||'')")
            if [ -z "$SCRIPT" ]; then
              echo "No test script defined — skipping."
            else
              echo "::error title=Test failure::Tests exited with a non-zero code."
              exit 1
            fi
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: frontend-dist
          path: dist/
          retention-days: 1

  # ──────────────────────────────────────────────────────────────
  #  BACKEND CI
  # ──────────────────────────────────────────────────────────────

  backend-ci:
    name: "Backend — Lint, Build & Test"
    needs: [change-detection, secret-scan]
    if: needs.change-detection.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: audit
          disable-sudo: true

      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false # zizmor hardening

      - name: Setup toolchain + install
        uses: ./.github/actions/setup-ci
        with:
          bun: "true"
          bun-version: ${{ env.BUN_VERSION }}
          install: bun
          install-args: "--frozen-lockfile"
          working-directory: ./backend

      - name: Type-check
        working-directory: ./backend
        run: bunx tsc --noEmit

      - name: Lint
        working-directory: ./backend
        run: bun run lint

      - name: Build
        working-directory: ./backend
        run: bun run build

      - name: Run tests
        working-directory: ./backend
        run: bun run test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: backend-test-results
          path: backend/test-results.xml
          retention-days: 7

  # ──────────────────────────────────────────────────────────────
  #  CODEQL ANALYSIS
  # ──────────────────────────────────────────────────────────────

  codeql:
    name: "CodeQL Analysis"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: audit
          disable-sudo: true

      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false # zizmor hardening

      - name: Initialize CodeQL
        uses: github/codeql-action/init@d77b13a0df3134d64a457ea9003f600b09fa1c8a # v3.36.1
        with:
          languages: javascript-typescript
          queries: security-and-quality

      - uses: github/codeql-action/autobuild@d77b13a0df3134d64a457ea9003f600b09fa1c8a # v3.36.1

      - name: Analyze
        uses: github/codeql-action/analyze@d77b13a0df3134d64a457ea9003f600b09fa1c8a # v3.36.1
        with:
          category: "/language:javascript-typescript"

  # ──────────────────────────────────────────────────────────────
  #  E2E / AUDIT TESTS
  #  (no disable-sudo here — `playwright install --with-deps` needs apt/root)
  # ──────────────────────────────────────────────────────────────

  e2e-audit:
    name: "E2E / Audit Tests"
    needs: [change-detection, frontend-ci]
    if: >-
      ${{
        !cancelled() &&
        (needs.frontend-ci.result == 'success' || needs.frontend-ci.result == 'skipped') &&
        (needs.change-detection.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch')
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      VITE_MOCK_AUTH: "true"
      VITE_API_URL: "http://localhost:4173"
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false # zizmor hardening

      - name: Setup toolchain + install
        uses: ./.github/actions/setup-ci
        with:
          node-version: ${{ env.NODE_VERSION }}
          install: npm
          install-args: "--legacy-peer-deps"

      # Cache Playwright browser binaries keyed on the resolved Playwright
      # version. Avoids re-downloading Chromium (~150 MB) every run.
      - name: Resolve Playwright version
        id: pw
        run: echo "version=$(node -e "console.log(require('@playwright/test/package.json').version)")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.pw.outputs.version }}

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
        # On a cache hit the browser is present; --with-deps still installs the
        # apt packages, which aren't cached. Cheap relative to the download.

      - name: Download built frontend artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: frontend-dist
          path: dist/
        continue-on-error: true

      - name: Build frontend (fallback if artifact missing)
        run: |
          if [ ! -d "dist" ] || [ -z "$(ls -A dist 2>/dev/null)" ]; then
            echo "No dist artifact found — building locally."
            npm run build
          fi

      - name: Start vite preview server
        run: npx vite preview --port 4173 &
        env:
          NODE_ENV: production

      - name: Wait for preview server
        run: npx wait-on http://localhost:4173 --timeout 30000

      - name: Run Playwright E2E / Audit tests
        run: npm run e2e:ci
        env:
          BASE_URL: http://localhost:4173
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 14

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-results
          path: e2e/test-results/
          retention-days: 14

      # ── Lighthouse CI (advisory) ──
      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.14.0 --no-fund --no-audit

      - name: Run Lighthouse CI
        run: |
          lhci autorun \
            --upload.target=temporary-public-storage \
            --collect.url=http://localhost:4173 \
            --collect.numberOfRuns=1 \
            --assert.assertions.categories:performance=warn \
            --assert.assertions.categories:accessibility=warn \
            --assert.assertions.categories:best-practices=warn \
            --assert.assertions.categories:seo=warn \
            --assert.budgets=[{"path":"/**","timings":[{"metric":"interactive","budget":10000}]}] || true
        env:
          BASE_URL: http://localhost:4173
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
        continue-on-error: true

      - name: Upload Lighthouse results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: lighthouse-report
          path: .lighthouseci/
          retention-days: 14

      # ── Security Headers Check (advisory) ──
      - name: Check security response headers
        run: |
          echo "Checking security headers on http://localhost:4173 ..."
          HEADERS=$(curl -sI http://localhost:4173)
          echo "$HEADERS"
          MISSING=""
          echo "$HEADERS" | grep -qi 'x-content-type-options' \
            || MISSING="$MISSING\n  X-Content-Type-Options missing (prevents MIME-sniffing)"
          echo "$HEADERS" | grep -qi 'x-frame-options\|content-security-policy' \
            || MISSING="$MISSING\n  X-Frame-Options / CSP frame-ancestors missing (clickjacking risk)"
          echo "$HEADERS" | grep -qi 'referrer-policy' \
            || MISSING="$MISSING\n  Referrer-Policy missing (leaks URLs to third parties)"
          if [ -n "$MISSING" ]; then
            echo "::warning title=Security Headers::The following headers are absent from the production build:"
            printf "$MISSING\n"
            echo "Add these in your CDN/reverse-proxy config (Vercel headers, nginx, CloudFront response policies)."
          else
            echo "All critical security headers present."
          fi

  # ──────────────────────────────────────────────────────────────
  #  STATUS GATE
  #
  #  The single required check for branch protection. It depends on the security
  #  jobs directly (notably secret-scan), closing a real gap: the CI jobs that
  #  depend on secret-scan report 'skipped' when it fails, and 'skipped' was
  #  treated as passing — so a leaked-secret detection could otherwise land a
  #  green required check. secret-scan failure now blocks the gate explicitly.
  # ──────────────────────────────────────────────────────────────

  status-check:
    name: "All Checks Passed"
    needs:
      [
        change-detection,
        secret-scan,
        frontend-ci,
        backend-ci,
        codeql,
        e2e-audit,
        npm-audit,
        osv-scan,
      ]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Evaluate outcomes
        run: |
          declare -A R=(
            [change-detection]="${{ needs.change-detection.result }}"
            [secret-scan]="${{ needs.secret-scan.result }}"
            [frontend-ci]="${{ needs.frontend-ci.result }}"
            [backend-ci]="${{ needs.backend-ci.result }}"
            [codeql]="${{ needs.codeql.result }}"
            [e2e-audit]="${{ needs.e2e-audit.result }}"
            [npm-audit]="${{ needs.npm-audit.result }}"
            [osv-scan]="${{ needs.osv-scan.result }}"
          )

          printf "%-18s %s\n" "Job" "Result"
          printf "%-18s %s\n" "---" "------"
          for job in "${!R[@]}"; do
            printf "%-18s %s\n" "$job" "${R[$job]}"
          done

          # Advisory jobs: failures are surfaced as warnings, not blockers.
          ADVISORY="osv-scan"

          FAILED=0
          for job in "${!R[@]}"; do
            case " $ADVISORY " in *" $job "*) continue;; esac
            if [[ "${R[$job]}" == "failure" || "${R[$job]}" == "cancelled" ]]; then
              echo "::error title=$job::$job concluded with '${R[$job]}'."
              FAILED=1
            fi
          done

          if [ "$FAILED" -eq 1 ]; then
            echo "One or more required jobs failed — see above."
            exit 1
          fi
          echo "All required checks passed or were skipped by path filter."

  # ──────────────────────────────────────────────────────────────
  #  DOCKER BUILD & PUBLISH  (main branch pushes only)
  # ──────────────────────────────────────────────────────────────

  publish-images:
    name: "Build, Scan & Publish Docker Images"
    runs-on: ubuntu-latest
    needs: [status-check, secret-scan]
    if: |
      always() &&
      needs.status-check.result == 'success' &&
      needs.secret-scan.result == 'success' &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
      security-events: write

    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: audit # build pulls many base layers; audit, not block

      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false # zizmor hardening

      - name: Setup QEMU
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v3.6.0

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0
        with:
          driver: docker-container

      - name: Login to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image namespace
        id: ns
        run: echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      # ── Frontend ────────────────────────────────────────────

      - name: Docker metadata — frontend
        id: meta_frontend
        uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804 # v5.7.0
        with:
          images: ghcr.io/${{ steps.ns.outputs.owner_lc }}/streamvault-frontend
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
          labels: |
            org.opencontainers.image.title=StreamVault Frontend
            org.opencontainers.image.description=StreamVault web application frontend
            org.opencontainers.image.vendor=${{ github.repository_owner }}

      - name: Build frontend image (local, pre-scan)
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: streamvault-frontend:scan
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

      - name: Scan frontend image with Trivy
        id: trivy_frontend
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: streamvault-frontend:scan
          format: sarif
          output: trivy-frontend.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload frontend Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@d77b13a0df3134d64a457ea9003f600b09fa1c8a # v3.36.1
        with:
          sarif_file: trivy-frontend.sarif
          category: trivy-frontend

      - name: Build and push frontend image (multi-platform)
        id: build_frontend
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: ${{ env.PLATFORMS }}
          provenance: true
          sbom: true
          tags: ${{ steps.meta_frontend.outputs.tags }}
          labels: ${{ steps.meta_frontend.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

      - name: Attest frontend build provenance
        uses: actions/attest-build-provenance@db473fddc028af60658334401dc6fa3ffd8669fd # v2.3.0
        with:
          subject-name: ghcr.io/${{ steps.ns.outputs.owner_lc }}/streamvault-frontend
          subject-digest: ${{ steps.build_frontend.outputs.digest }}
          push-to-registry: true

      # ── Backend ─────────────────────────────────────────────

      - name: Docker metadata — backend
        id: meta_backend
        uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804 # v5.7.0
        with:
          images: ghcr.io/${{ steps.ns.outputs.owner_lc }}/streamvault-backend
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
          labels: |
            org.opencontainers.image.title=StreamVault Backend
            org.opencontainers.image.description=StreamVault API backend
            org.opencontainers.image.vendor=${{ github.repository_owner }}

      - name: Build backend image (local, pre-scan)
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          load: true
          tags: streamvault-backend:scan
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Scan backend image with Trivy
        id: trivy_backend
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: streamvault-backend:scan
          format: sarif
          output: trivy-backend.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload backend Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@d77b13a0df3134d64a457ea9003f600b09fa1c8a # v3.36.1
        with:
          sarif_file: trivy-backend.sarif
          category: trivy-backend

      - name: Build and push backend image (multi-platform)
        id: build_backend
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          platforms: ${{ env.PLATFORMS }}
          provenance: true
          sbom: true
          tags: ${{ steps.meta_backend.outputs.tags }}
          labels: ${{ steps.meta_backend.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Attest backend build provenance
        uses: actions/attest-build-provenance@db473fddc028af60658334401dc6fa3ffd8669fd # v2.3.0
        with:
          subject-name: ghcr.io/${{ steps.ns.outputs.owner_lc }}/streamvault-backend
          subject-digest: ${{ steps.build_backend.outputs.digest }}
          push-to-registry: true

  # ──────────────────────────────────────────────────────────────
  #  DEPLOYMENT  (main branch pushes only)
  #
  #  Deploy jobs use their OWN concurrency group with cancel-in-progress:false,
  #  so the workflow-level cancel-in-progress:true (good for CI) can never abort
  #  an in-flight rollout part-way through a kubectl apply.
  # ──────────────────────────────────────────────────────────────

  deploy-canary:
    name: "Deploy — Canary (5%)"
    needs: [publish-images]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: streamvault-deploy
      cancel-in-progress: false
    environment:
      name: production-canary
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false # zizmor hardening

      # - name: Authenticate to Google Cloud
      #   uses: google-github-actions/auth@v3
      #   with:
      #     workload_identity_provider: projects/PROJECT_NUM/locations/global/workloadIdentityPools/POOL/providers/PROVIDER
      #     service_account: streamvault-deployer@PROJECT_ID.iam.gserviceaccount.com

      - name: Deploy canary release
        run: |
          # kubectl apply -f k8s/canary/
          echo "Canary deploy — replace with real commands."

      - name: Health-check canary
        run: |
          # kubectl rollout status deployment/streamvault-canary --timeout=5m
          echo "Health check — replace with real commands."

  deploy-production:
    name: "Deploy — Production (100%)"
    needs: [deploy-canary]
    # Explicit guard (defence in depth — already inherited via deploy-canary).
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: streamvault-deploy
      cancel-in-progress: false
    environment:
      name: production
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false # zizmor hardening

      - name: Promote canary to production
        run: |
          # kubectl apply -f k8s/production/
          echo "Production promotion — replace with real commands."

      - name: Verify rollout
        run: |
          # kubectl rollout status deployment/streamvault --timeout=10m
          echo "Rollout verification — replace with real commands."

      - name: Rollback on failure
        if: failure()
        run: |
          # kubectl rollout undo deployment/streamvault
          echo "Rollback — replace with real commands."
