# ------------------------------------------------------------
#  StreamVault - Enterprise CI/CD Pipeline
#  Architecture: DAG-based, path-filtered, security-hardened
# ------------------------------------------------------------

name: StreamVault CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    - cron: "31 2 * * 1"   # Weekly security sweep — Monday 02:31 UTC

# ── Cancel superseded runs immediately ──────────────────────
concurrency:
  group: streamvault-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ── Org-wide least-privilege default ────────────────────────
permissions:
  contents: read

# ── Pinned toolchain versions (single source of truth) ──────
env:
  NODE_VERSION: "22"
  BUN_VERSION:  "latest"
  PLATFORMS:    "linux/amd64,linux/arm64"
  # Opt into Node.js 24 for all JS-based actions ahead of the
  # June 2026 forced migration (GitHub deprecation notice).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# ============================================================
#  PHASE 0 — Change Detection
#  Determines which service(s) were actually touched so
#  subsequent jobs can be skipped when irrelevant.
# ============================================================
jobs:

  change-detection:
    name: "🔍 Change Detection"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend:  ${{ steps.filter.outputs.backend }}
      docker:   ${{ steps.filter.outputs.docker }}
      infra:    ${{ steps.filter.outputs.infra }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            frontend:
              - "src/**"
              - "public/**"
              - "package.json"
              - "package-lock.json"
              - "tsconfig*.json"
              - "vite.config.*"
              - "shared/**"
            backend:
              - "backend/**"
              - "shared/**"
            docker:
              - "Dockerfile"
              - "backend/Dockerfile"
              - "docker-compose*.yml"
              - ".dockerignore"
            infra:
              - "infra/**"
              - "k8s/**"
              - ".github/workflows/**"

  # ============================================================
  #  PHASE 1 — Security Pre-Flight (always runs)
  #  Fail fast on secrets or workflow vulnerabilities before
  #  spending any compute on builds.
  # ============================================================

  secret-scan:
    name: "🔐 Secret Scan"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout (full history for Gitleaks)
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Gitleaks — detect leaked credentials
        # v2.3.9+ ships with a Node 24 runtime — eliminates the Node 20 deprecation warning.
        uses: gitleaks/gitleaks-action@v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-review:
    name: "📦 Dependency Review"
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # continue-on-error: Dependency Graph may be disabled on free/private repos.
    # Enable it at: Settings → Code security and analysis → Dependency graph.
    # Once enabled, remove this line to make the check required.
    continue-on-error: true
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Review dependency changes
        # v4.7.0+ ships a Node 24 runtime — silences the Node 20 deprecation warning.
        uses: actions/dependency-review-action@v4.7.0
        with:
          fail-on-severity: high
          comment-summary-in-pr: always

  # ============================================================
  #  PHASE 2 — Frontend CI
  #  Only runs when frontend/* or shared/* files changed.
  # ============================================================

  frontend-ci:
    name: "⚡ Frontend — Lint, Build & Test"
    needs: [change-detection, secret-scan]
    if: needs.change-detection.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test (if present)
        run: npm run test --if-present

      # Cache the build output for the Docker stage
      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          retention-days: 1

  # ============================================================
  #  PHASE 2 — Backend CI
  #  Only runs when backend/* or shared/* files changed.
  #  Implements full Bun global-cache preservation.
  # ============================================================

  backend-ci:
    name: "🚀 Backend — Lint, Build & Test"
    needs: [change-detection, secret-scan]
    if: needs.change-detection.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      # ── Bun global cache (~/.bun/install/cache) ────────────
      # setup-bun does not cache dependencies itself, so we do
      # it explicitly. Key includes lockfile hash for exact hits;
      # restore-keys allow partial hits on new packages.
      - name: Restore Bun dependency cache
        id: bun-cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('backend/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Setup Bun ${{ env.BUN_VERSION }}
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        working-directory: ./backend
        run: bun install --frozen-lockfile

      - name: Lint
        working-directory: ./backend
        run: bun run lint

      - name: Build
        working-directory: ./backend
        run: bun run build

      - name: Test (if present)
        working-directory: ./backend
        run: |
          if node -e "const p=require('./package.json');process.exit(p.scripts?.test ? 0 : 1)" 2>/dev/null; then
            bun run test
          else
            echo "No test script found — skipping."
          fi

  # ============================================================
  #  PHASE 3 — Static Analysis (CodeQL)
  #  Runs in parallel with CI jobs; uploads to Security tab.
  # ============================================================

  codeql:
    name: "🔬 CodeQL Analysis"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions:         read
      contents:        read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Analyze
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:javascript-typescript"

  # ============================================================
  #  PHASE 4 — Global Status Check
  #  Satisfies branch-protection rules even when path-filtered
  #  jobs are legitimately skipped. Always runs; evaluates
  #  outcomes of Phase 2 jobs.
  # ============================================================

  status-check:
    name: "✅ All Checks Passed"
    needs: [frontend-ci, backend-ci, codeql]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Evaluate job outcomes
        run: |
          echo "frontend-ci : ${{ needs.frontend-ci.result }}"
          echo "backend-ci  : ${{ needs.backend-ci.result }}"
          echo "codeql      : ${{ needs.codeql.result }}"

          # A job result of 'skipped' is acceptable (path filter).
          # Fail the check only if a job explicitly failed or cancelled.
          for result in \
            "${{ needs.frontend-ci.result }}" \
            "${{ needs.backend-ci.result }}" \
            "${{ needs.codeql.result }}"; do
            if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
              echo "❌ One or more required jobs failed."
              exit 1
            fi
          done
          echo "✅ All required checks passed or were appropriately skipped."

  # ============================================================
  #  PHASE 5 — Build & Publish Docker Images (main branch only)
  #
  #  Improvements over baseline:
  #   • Multi-platform builds (amd64 + arm64 via QEMU)
  #   • Trivy container scan BEFORE registry push
  #   • SARIF upload to GitHub Security dashboard
  #   • Build provenance attestations & SBOMs (SLSA L3)
  #   • Normalized image namespace (lowercase owner)
  # ============================================================

  publish-images:
    name: "🐳 Build, Scan & Publish Docker Images"
    runs-on: ubuntu-latest
    needs: [status-check, secret-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 60
    permissions:
      contents:      read
      packages:      write
      attestations:  write
      id-token:      write
      security-events: write   # for Trivy SARIF upload

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      # ── Docker build infrastructure ────────────────────────
      - name: Setup QEMU (cross-compilation for ARM64)
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Normalize owner to lowercase (GHCR requirement) ───
      - name: Resolve image namespace
        id: ns
        run: echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      # ══════════════════════════════════════════════════════
      #  FRONTEND IMAGE
      # ══════════════════════════════════════════════════════

      - name: Docker metadata — frontend
        id: meta_frontend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.ns.outputs.owner_lc }}/streamvault-frontend
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
          labels: |
            org.opencontainers.image.title=StreamVault Frontend
            org.opencontainers.image.description=StreamVault web application frontend
            org.opencontainers.image.vendor=${{ github.repository_owner }}

      # Build locally first (no push) so Trivy can scan it
      - name: Build frontend image (local, pre-scan)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: streamvault-frontend:scan
          cache-from: type=gha,scope=frontend
          cache-to:   type=gha,scope=frontend,mode=max

      - name: Scan frontend image — Trivy
        id: trivy_frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref:    streamvault-frontend:scan
          format:       sarif
          output:       trivy-frontend.sarif
          severity:     CRITICAL,HIGH
          exit-code:    "1"          # Block push on CRITICAL/HIGH CVEs
          ignore-unfixed: true

      - name: Upload frontend Trivy SARIF to GitHub Security
        if: always()                 # Upload even if scan failed
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-frontend.sarif
          category:   trivy-frontend

      # Now push the clean image multi-platform
      - name: Build and push frontend image (multi-platform)
        id: build_frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: ${{ env.PLATFORMS }}
          provenance: true
          sbom: true
          tags:   ${{ steps.meta_frontend.outputs.tags }}
          labels: ${{ steps.meta_frontend.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to:   type=gha,scope=frontend,mode=max

      - name: Attest frontend build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name:   ghcr.io/${{ steps.ns.outputs.owner_lc }}/streamvault-frontend
          subject-digest: ${{ steps.build_frontend.outputs.digest }}
          push-to-registry: true

      # ══════════════════════════════════════════════════════
      #  BACKEND IMAGE
      # ══════════════════════════════════════════════════════

      - name: Docker metadata — backend
        id: meta_backend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.ns.outputs.owner_lc }}/streamvault-backend
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
          labels: |
            org.opencontainers.image.title=StreamVault Backend
            org.opencontainers.image.description=StreamVault API backend
            org.opencontainers.image.vendor=${{ github.repository_owner }}

      - name: Build backend image (local, pre-scan)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          load: true
          tags: streamvault-backend:scan
          cache-from: type=gha,scope=backend
          cache-to:   type=gha,scope=backend,mode=max

      - name: Scan backend image — Trivy
        id: trivy_backend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref:    streamvault-backend:scan
          format:       sarif
          output:       trivy-backend.sarif
          severity:     CRITICAL,HIGH
          exit-code:    "1"
          ignore-unfixed: true

      - name: Upload backend Trivy SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-backend.sarif
          category:   trivy-backend

      - name: Build and push backend image (multi-platform)
        id: build_backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          platforms: ${{ env.PLATFORMS }}
          provenance: true
          sbom: true
          tags:   ${{ steps.meta_backend.outputs.tags }}
          labels: ${{ steps.meta_backend.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to:   type=gha,scope=backend,mode=max

      - name: Attest backend build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name:   ghcr.io/${{ steps.ns.outputs.owner_lc }}/streamvault-backend
          subject-digest: ${{ steps.build_backend.outputs.digest }}
          push-to-registry: true

  # ============================================================
  #  PHASE 6 — OIDC-based Cloud Deployment (Canary → Full)
  #
  #  Uses Workload Identity Federation — zero long-lived secrets.
  #  Adapt the auth step for your cloud provider:
  #    GCP  → google-github-actions/auth@v3
  #    AWS  → aws-actions/configure-aws-credentials@v4
  #    Azure → azure/login@v2
  #
  #  Replace the placeholder deploy steps with your actual
  #  kubectl / helm / gcloud run commands.
  # ============================================================

  deploy-canary:
    name: "🚀 Deploy — Canary (5% traffic)"
    needs: [publish-images]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: production-canary
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Deploy canary release
        run: |
          echo "Deploying canary to 5% of traffic..."
          # kubectl apply -f k8s/canary/
          # kubectl set image deployment/streamvault-canary \
          #   frontend=ghcr.io/${{ github.repository_owner }}/streamvault-frontend:sha-${{ github.sha }} \
          #   backend=ghcr.io/${{ github.repository_owner }}/streamvault-backend:sha-${{ github.sha }}
          echo "Canary deployed (stub - replace with real commands)."

      - name: Health-check canary
        run: |
          echo "Waiting for canary pods to stabilize..."
          # kubectl rollout status deployment/streamvault-canary --timeout=5m
          # curl -sf https://canary.streamvault.example.com/health || exit 1
          echo "Health check passed (stub)."

  deploy-production:
    name: "🌐 Deploy — Production (100% traffic)"
    needs: [deploy-canary]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: production
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Promote canary to production
        run: |
          echo "Promoting to 100% production traffic..."
          # kubectl apply -f k8s/production/
          # kubectl set image deployment/streamvault ...
          echo "Production deploy complete (stub)."

      - name: Verify production rollout
        run: |
          # kubectl rollout status deployment/streamvault --timeout=10m
          echo "Rollout verified (stub)."

      - name: Automated rollback on failure
        if: failure()
        run: |
          echo "Deployment failed - initiating automatic rollback..."
          # kubectl rollout undo deployment/streamvault
          echo "Rollback complete."
