# StreamVault — OpenSSF Scorecard
# Scores the repo against supply-chain best practices (branch protection,
# token permissions, pinned dependencies, dangerous workflow patterns, …)
# and publishes findings to the Security tab. Public-repo state-of-the-art.

name: "OpenSSF Scorecard"

on:
  branch_protection_rule:
  schedule:
    - cron: "27 4 * * 1"   # Weekly — Monday 04:27 UTC
  push:
    branches: ["main"]
  workflow_dispatch:

permissions: read-all

jobs:
  analysis:
    name: "Scorecard analysis"
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # upload SARIF
      id-token: write          # publish results to the public Scorecard API
      contents: read
      actions: read
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5  # v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5.0.0
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@af76153369ae1eb1eaffc4118046b7fda9a8419e  # main
        with:
          results_file: scorecard.sarif
          results_format: sarif
          publish_results: true   # required for the Scorecard badge

      - name: Upload SARIF to Security tab
        uses: github/codeql-action/upload-sarif@f35333b910470a5408cb081b68f0701254a7d27b  # v3.28.18
        with:
          sarif_file: scorecard.sarif
          category: ossf-scorecard

      - name: Upload artifact (raw results)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: scorecard-results
          path: scorecard.sarif
          retention-days: 14