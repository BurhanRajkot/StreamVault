# StreamVault Frontend — Production nginx Configuration
# Serves the Vite-built SPA with security headers, gzip, and caching.

worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        application/atom+xml
        image/svg+xml
        font/woff2;

    server {
        listen 8080;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # ── Security Headers ────────────────────────────────
        add_header X-Frame-Options        "SAMEORIGIN"   always;
        add_header X-Content-Type-Options  "nosniff"      always;
        add_header Referrer-Policy         "strict-origin-when-cross-origin"  always;
        add_header Permissions-Policy      "accelerometer=*, autoplay=*, clipboard-write=*, encrypted-media=*, gyroscope=*, picture-in-picture=*, fullscreen=*" always;
        add_header Cross-Origin-Opener-Policy   "unsafe-none" always;
        add_header Cross-Origin-Resource-Policy "same-origin"  always;

        # ── Immutable hashed assets (Vite output) ──────────
        # Files like /assets/chunk-abc123.js get year-long cache.
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            try_files $uri =404;
        }

        # ── Service Worker and PWA files ────────────────────
        location ~* ^/(sw\.js|workbox-.*\.js|registerSW\.js|manifest\.json)$ {
            add_header Cache-Control "no-cache" always;
            try_files $uri =404;
        }

        # ── Static files (icons, logos, images) ─────────────
        location ~* ^/(icons|logos|error-images|blocker)/ {
            expires 7d;
            add_header Cache-Control "public, max-age=604800" always;
            try_files $uri =404;
        }

        # ── SPA Fallback ────────────────────────────────────
        # All non-file routes fall through to index.html for
        # client-side routing (React Router).
        location / {
            add_header Cache-Control "no-cache" always;
            try_files $uri $uri/ /index.html;
        }

        # ── Health check endpoint ───────────────────────────
        location = /healthz {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # ── Block dot-files ─────────────────────────────────
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
