
services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8081:8080"
    volumes:
      # Mount source code for hot-reloading
      - ./src:/app/src
      - ./public:/app/public
      - ./index.html:/app/index.html
      - ./vite.config.ts:/app/vite.config.ts
      # Prevent overwriting node_modules
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    env_file:
      - .env.local
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - streamvault-network
    restart: unless-stopped

  backend:
    depends_on:
      redis:
        condition: service_healthy
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    volumes:
      # Mount source code for hot-reloading
      - ./backend/src:/app/src
      # Prevent overwriting node_modules
      - /app/node_modules
    environment:
      - REDIS_URL=redis://redis:6379
    env_file:
      - .env.local
    healthcheck:
      test: ["CMD-SHELL", "bun -e \"fetch('http://localhost:4000/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - streamvault-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - streamvault-network
    restart: unless-stopped

networks:
  streamvault-network:
    driver: bridge

volumes:
  redis-data:
