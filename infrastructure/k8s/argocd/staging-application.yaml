# ArgoCD Application — StreamVault Staging
# Points to the staging kustomize overlay.
# Uses MANUAL sync (no automated) — engineer triggers deploys to staging.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: streamvault-staging
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: streamvault
    environment: staging
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/BurhanRajkot/StreamVault.git
    targetRevision: main  # Change to 'develop' branch once you create it
    path: k8s/overlays/staging

  destination:
    server: https://kubernetes.default.svc
    namespace: streamvault-staging

  syncPolicy:
    # Manual sync for staging — trigger via ArgoCD UI or: argocd app sync streamvault-staging
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 1m

  # Ignore Argo Rollouts controller-managed fields
  ignoreDifferences:
    - group: argoproj.io
      kind: Rollout
      jsonPointers:
        - /spec/template/metadata/annotations
        - /status
