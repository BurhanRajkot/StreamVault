apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: streamvault

resources:
  # ── Cluster Infrastructure ──────────────────────────────────
  - namespace.yaml
  - serviceaccounts.yaml
  - configmap.yaml

  # ── Application Workloads ───────────────────────────────────
  - frontend-rollout.yaml
  - frontend-service.yaml
  - backend-rollout.yaml
  - backend-service.yaml
  - redis-deployment.yaml
  - redis-service.yaml

  # ── Networking ──────────────────────────────────────────────
  - istio-gateway.yaml
  - network-policy.yaml

  # ── Autoscaling & Availability ──────────────────────────────
  - hpa.yaml
  - pdb.yaml

  # ── Argo Rollouts Analysis Templates ───────────────────────
  - analysis-templates/success-rate.yaml
  - analysis-templates/p95-latency.yaml

  # ── Scheduled Security Jobs ──────────────────────────────────
  - media-scan-cronjob.yaml

labels:
  - pairs:
      app.kubernetes.io/part-of: streamvault
      app.kubernetes.io/managed-by: kustomize
    includeSelectors: false
