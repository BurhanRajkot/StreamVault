# StreamVault Istio Gateway
# This Gateway is referenced by both frontend-service.yaml and backend-service.yaml
# VirtualServices. Without this resource, Istio has nothing to attach routes to.
#
# Hosts are set to "*" (wildcard) so it works regardless of cluster IP/DNS.
# Replace "*" with your real domain (e.g. streamvault.yourdomain.com) for production.
---
apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: streamvault-gateway
  labels:
    app.kubernetes.io/part-of: streamvault
spec:
  selector:
    istio: ingressgateway  # Default Istio ingress gateway selector
  servers:
    # ── HTTP (port 80) ─────────────────────────────────────
    - port:
        number: 80
        name: http
        protocol: HTTP
      hosts:
        - "*"  # Replace with your domain in production overlays
      # Redirect HTTP → HTTPS in production (uncomment after TLS is set up):
      # tls:
      #   httpsRedirect: true

    # ── HTTPS (port 443) — uncomment after adding TLS cert ─
    # - port:
    #     number: 443
    #     name: https
    #     protocol: HTTPS
    #   hosts:
    #     - "streamvault.yourdomain.com"
    #   tls:
    #     mode: SIMPLE
    #     credentialName: streamvault-tls-cert  # cert-manager Secret name
