apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: streamvault

resources:
  - ../../base

# ── Image Tags ──────────────────────────────────────────────────
# Image tags are updated by the GitOps workflow (gitops-deploy.yml).
# ArgoCD detects the commit and syncs the cluster.
# Registry: GitHub Container Registry (ghcr.io)
# Org: burhanrajkot (your GitHub username)
images:
  - name: ghcr.io/burhanrajkot/streamvault-frontend
    newTag: sha-a5fc430  # Replaced by GitOps workflow with sha-<commit>
  - name: ghcr.io/burhanrajkot/streamvault-backend
    newTag: sha-a5fc430  # Replaced by GitOps workflow with sha-<commit>

# ── Patches ─────────────────────────────────────────────────────
patches:
  - path: patches/replicas.yaml
  - target:
      kind: Rollout
      name: streamvault-frontend
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            cpu: "1"
            memory: 512Mi
  - target:
      kind: Rollout
      name: streamvault-backend
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: "2"
            memory: "1Gi"
  - path: patches/configmap.yaml

