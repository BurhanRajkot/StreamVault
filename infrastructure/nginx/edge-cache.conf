worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /run/nginx.pid;

events {
    worker_connections 2048;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time cache_status=$upstream_cache_status';
    
    access_log /var/log/nginx/access.log main;

    # Performance optimizations
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;

    # Define the caching directory for streaming assets
    # Using levels=1:2 and limiting maximum size to 20GB. Inactive caches cleared in 60m.
    # use_temp_path=off writes file fragments directly into the cache directory.
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=media_cache:100m max_size=20g inactive=60m use_temp_path=off;

    upstream streamvault_api {
        server backend:4000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        # ── 1. Dynamic Manifests (Always Bypass Cache) ────────────────
        # Manifests (.m3u8 and .mpd) change continuously during streaming or update frequently.
        # Caching them would cause buffering or stream freezing.
        location ~* \.(m3u8|mpd)$ {
            proxy_pass http://streamvault_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_cache off;
            expires -1;
            add_header X-Cache-Status "BYPASS - Manifest File";
        }

        # ── 2. Video Segments (Cache Aggressively) ───────────────────
        # .ts (HLS) and .m4s (DASH) files are immutable. They can be cached forever
        # to offload delivery logic from the Bun runtime.
        location ~* \.(ts|m4s)$ {
            proxy_pass http://streamvault_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_cache media_cache;
            proxy_cache_key $request_uri;
            proxy_cache_valid 200 60m;
            
            # Request Collapsing
            # If 100 clients request the same uncached segment simultaneously, only 1 request is sent upstream.
            # The other 99 wait and are served directly from the cached result.
            proxy_cache_lock on;
            proxy_cache_lock_timeout 5s;

            # Custom response header to verify caching status
            add_header X-Cache-Status $upstream_cache_status;
            
            expires 7d;
        }

        # ── 3. General Routes (Fallback to Backend) ──────────────────
        location / {
            proxy_pass http://streamvault_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_cache off;
            add_header X-Cache-Status "BYPASS - General API Request";
        }
    }
}
