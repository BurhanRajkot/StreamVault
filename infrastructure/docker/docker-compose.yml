version: '3.8'

services:
  frontend:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile
      target: development
    ports:
      - "8081:8080"
    volumes:
      # Mount entire root context for vite to detect config and source correctly
      - ../..:/opt/app
      # Prevent overwriting node_modules on Linux from Windows host
      - /opt/app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    env_file:
      - ../../.env.local
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - streamvault-network
    restart: unless-stopped

  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
      target: development
    ports:
      - "4000:4000"
    volumes:
      # Mount backend source code for hot-reloading
      - ../../backend:/opt/app
      # Prevent overwriting node_modules on Linux from Windows host
      - /opt/app/node_modules
      # Persistent storage mount for raw movie files mapped as read-only
      # Create a local ./media directory or link your real media vault here
      - ../../media:/media:ro
    environment:
      - REDIS_URL=redis://redis:6379
      - CHOKIDAR_USEPOLLING=true
    env_file:
      - ../../.env.local
    healthcheck:
      test: ["CMD-SHELL", "bun -e \"fetch('http://localhost:4000/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    # RAM-backed ephemeral storage for continuous HLS/DASH transcoding workloads
    # Keeps disk writes in memory to prevent solid state drive wear-and-tear
    tmpfs:
      - /tmp/hls:mode=1777,size=4G,uid=1001,gid=1001
    # Raising file descriptor limits to avoid connection dropout errors under load
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    # ── OPTIONAL HARDWARE ACCELERATION FOR TRANSCODING ──────────────────
    # Uncomment the block below to enable NVIDIA GPU hardware transcoding
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu, video, compute]
    #
    # Uncomment the block below to enable Intel QuickSync (QSV) transcoding
    # devices:
    #   - /dev/dri:/dev/dri
    # ────────────────────────────────────────────────────────────────────
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - streamvault-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - streamvault-network
    restart: unless-stopped

  edge-cache:
    image: nginx:1.27-alpine
    container_name: streamvault_edge_cache
    restart: unless-stopped
    ports:
      - "8082:80" # Exposed on port 8082 to act as a cached media streaming proxy
    volumes:
      - ../nginx/edge-cache.conf:/etc/nginx/nginx.conf:ro
      - nginx_cache:/var/cache/nginx
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - streamvault-network

networks:
  streamvault-network:
    driver: bridge

volumes:
  redis-data:
  nginx_cache:
