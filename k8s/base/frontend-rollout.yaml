# StreamVault Frontend — Argo Rollout with Canary Strategy
# Progressive delivery: 5% → 20% → 50% → 100% with Prometheus analysis gates.
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: streamvault-frontend
  labels:
    app.kubernetes.io/name: streamvault-frontend
    app.kubernetes.io/component: frontend
spec:
  replicas: 3
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: streamvault-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: streamvault-frontend
        app.kubernetes.io/component: frontend
    spec:
      serviceAccountName: streamvault-frontend
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      containers:
        - name: frontend
          image: ghcr.io/burhanrajkot/streamvault-frontend:latest  # Updated by GitOps workflow
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false  # nginx needs to write to /var/cache
            capabilities:
              drop: ["ALL"]
  strategy:
    canary:
      # ── Traffic Routing via Istio ─────────────────────────
      canaryService: streamvault-frontend-canary
      stableService: streamvault-frontend-stable
      trafficRouting:
        istio:
          virtualServices:
            - name: streamvault-frontend-vsvc
              routes:
                - primary
      # ── Progressive Steps ─────────────────────────────────
      steps:
        - setWeight: 5
        - pause: { duration: 5m }
        - analysis:
            templates:
              - templateName: success-rate
              - templateName: p95-latency
            args:
              - name: service-name
                value: streamvault-frontend-canary
        - setWeight: 20
        - pause: { duration: 5m }
        - analysis:
            templates:
              - templateName: success-rate
              - templateName: p95-latency
            args:
              - name: service-name
                value: streamvault-frontend-canary
        - setWeight: 50
        - pause: { duration: 10m }
        - analysis:
            templates:
              - templateName: success-rate
              - templateName: p95-latency
            args:
              - name: service-name
                value: streamvault-frontend-canary
        - setWeight: 100
      # ── Rollback Configuration ────────────────────────────
      maxSurge: 1
      maxUnavailable: 0
      abortScaleDownDelaySeconds: 30
