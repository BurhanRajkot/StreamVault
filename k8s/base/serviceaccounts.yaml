# StreamVault ServiceAccounts
# Both rollouts reference these service accounts.
# automountServiceAccountToken: false is a security best practice —
# prevents pods from accidentally reading the k8s API.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: streamvault-frontend
  labels:
    app.kubernetes.io/name: streamvault-frontend
    app.kubernetes.io/component: frontend
automountServiceAccountToken: false
imagePullSecrets:
  - name: ghcr-pull-secret
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: streamvault-backend
  labels:
    app.kubernetes.io/name: streamvault-backend
    app.kubernetes.io/component: backend
automountServiceAccountToken: false
imagePullSecrets:
  - name: ghcr-pull-secret
