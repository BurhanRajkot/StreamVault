# StreamVault Kubernetes Secret — TEMPLATE FILE
# ════════════════════════════════════════════════════════════════
#  ⚠️  WARNING: DO NOT commit real credentials here.
#  All values below are base64-encoded placeholder strings.
#  In production, populate secrets via CI using:
#
#    kubectl create secret generic streamvault-secrets \
#      --from-literal=TMDB_API_KEY="<real_value>" \
#      --from-literal=AUTH0_DOMAIN="<real_value>" \
#      ... etc \
#      -n streamvault --dry-run=client -o yaml | kubectl apply -f -
#
#  Or use External Secrets Operator to sync from your secret store.
# ════════════════════════════════════════════════════════════════
apiVersion: v1
kind: Secret
metadata:
  name: streamvault-secrets
  labels:
    app.kubernetes.io/part-of: streamvault
type: Opaque
# All values are base64("changeme") — replace before deploying!
# Run: echo -n "your_real_value" | base64
stringData:
  # ── TMDB ──────────────────────────────────────────────────
  TMDB_API_KEY: "changeme"
  VITE_TMDB_API_KEY: "changeme"

  # ── Auth0 ─────────────────────────────────────────────────
  AUTH0_DOMAIN: "your-tenant.auth0.com"
  AUTH0_AUDIENCE: "changeme"
  AUTH0_ISSUER_BASE_URL: "https://your-tenant.auth0.com/"

  # ── Supabase ───────────────────────────────────────────────
  SUPABASE_URL: "https://your-project.supabase.co"
  SUPABASE_SERVICE_ROLE_KEY: "changeme"

  # ── Admin ─────────────────────────────────────────────────
  ADMIN_SECRET: "changeme"
  ADMIN_JWT_SECRET: "changeme"

  # ── Database ──────────────────────────────────────────────
  DATABASE_URL: "changeme"

  # ── Gemini ────────────────────────────────────────────────
  GEMINI_API_KEY: "changeme"

  # ── Stripe ────────────────────────────────────────────────
  STRIPE_SECRET_KEY: "changeme"
  STRIPE_WEBHOOK_SECRET: "changeme"

  # ── UPI Payments ──────────────────────────────────────────
  UPI_ID: "changeme"
  UPI_PAYEE_NAME: "changeme"

  # ── Frontend Vite (injected at build time via Docker ARG)  ─
  # These are referenced here for documentation purposes;
  # they are baked into the frontend image at build time.
  VITE_AUTH0_CLIENT_ID: "changeme"
  VITE_AUTH0_AUDIENCE: "changeme"
  VITE_SUPABASE_ANON_KEY: "changeme"
