apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: streamvault

resources:
  - ../../base

# ── Image Tags ──────────────────────────────────────────────────
# Image tags are updated by the GitOps workflow (gitops-deploy.yml).
# ArgoCD detects the commit and syncs the cluster.
# Registry: GitHub Container Registry (ghcr.io)
# Org: burhanrajkot (your GitHub username)
images:
  - name: ghcr.io/burhanrajkot/streamvault-frontend
    newTag: sha-a99f3c9  # Replaced by GitOps workflow with sha-<commit>
  - name: ghcr.io/burhanrajkot/streamvault-backend
    newTag: sha-a99f3c9  # Replaced by GitOps workflow with sha-<commit>

# ── Patches ─────────────────────────────────────────────────────
patches:
  - path: patches/replicas.yaml
  - path: patches/resources.yaml
  - path: patches/configmap.yaml

