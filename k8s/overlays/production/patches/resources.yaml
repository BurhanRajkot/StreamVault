# Production: increased resource limits
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: streamvault-frontend
spec:
  template:
    spec:
      containers:
        - name: frontend
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
---
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: streamvault-backend
spec:
  template:
    spec:
      containers:
        - name: backend
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: "1Gi"
